<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Footbag Event Side-by-Side Inspector (Mirror)</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  background: #f8f8f8;
  color: #222;
}

/* ---- NAV BAR ---- */
#navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #fff;
  border-bottom: 2px solid #ccc;
  padding: 8px 12px;
}

.nav-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}

.nav-counter {
  font-weight: bold;
  font-size: 15px;
  min-width: 80px;
}

button.nav-btn {
  padding: 5px 14px;
  cursor: pointer;
  background: #e0e0e0;
  border: 1px solid #aaa;
  border-radius: 4px;
  font-size: 13px;
}
button.nav-btn:hover { background: #ccc; }

select#jumpSelect {
  padding: 4px 8px;
  font-size: 13px;
  max-width: 360px;
}

.group-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}

.group-filters label {
  font-size: 12px;
  font-weight: bold;
  color: #555;
  margin-right: 4px;
}

button.group-btn {
  padding: 3px 10px;
  cursor: pointer;
  background: #f0f0f0;
  border: 1px solid #bbb;
  border-radius: 12px;
  font-size: 12px;
}
button.group-btn:hover { background: #ddd; }
button.group-btn.active { background: #4a90d9; color: #fff; border-color: #2b6cb0; }
button#btnAll {
  padding: 3px 10px;
  cursor: pointer;
  background: #4a90d9;
  color: #fff;
  border: 1px solid #2b6cb0;
  border-radius: 12px;
  font-size: 12px;
}
button#btnAll:hover { background: #2b6cb0; }
button#btnAll.inactive { background: #f0f0f0; color: #333; border-color: #bbb; }

/* ---- SOURCE BADGES ---- */
.source-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: bold;
  color: #fff;
  margin-right: 4px;
}
.source-badge.MIRROR_HTML { background: #28a745; }
.source-badge.DERIVED_RAW { background: #fd7e14; }
.source-badge.MISSING { background: #dc3545; }

.source-path {
  font-size: 11px;
  color: #666;
  font-family: monospace;
  word-break: break-all;
}

/* ---- TOGGLE BUTTONS ---- */
.toggle-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
button.toggle-btn {
  padding: 3px 10px;
  cursor: pointer;
  background: #e9ecef;
  border: 1px solid #adb5bd;
  border-radius: 4px;
  font-size: 11px;
}
button.toggle-btn:hover { background: #dee2e6; }
button.toggle-btn.active {
  background: #0d6efd;
  color: #fff;
  border-color: #0a58ca;
}

/* ---- EVENT HEADER ---- */
#eventHeader {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 4px;
  margin: 8px 12px;
  padding: 10px 14px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
}

.event-meta h2 {
  font-size: 16px;
  margin-bottom: 4px;
}
.event-meta .meta-row {
  font-size: 12px;
  color: #555;
  margin-bottom: 3px;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: bold;
  margin-right: 4px;
}
.badge-HIGH { background: #f5c6cb; color: #721c24; }
.badge-MEDIUM { background: #ffeeba; color: #856404; }
.badge-LOW { background: #d4edda; color: #155724; }
.badge-division_mismatch { background: #f8d7da; color: #721c24; }
.badge-placement_mismatch { background: #fff3cd; color: #856404; }
.badge-known_issue { background: #f5c6cb; color: #721c24; }
.badge-override_used { background: #cce5ff; color: #004085; }
.badge-recently_modified { background: #d4edda; color: #155724; }
.badge-text_cleanup_candidate { background: #e2e3e5; color: #383d41; }
.badge-metadata_only { background: #e2e3e5; color: #383d41; }
.badge-other { background: #e2e3e5; color: #383d41; }

.count-ok { color: #155724; }
.count-mismatch { color: #721c24; font-weight: bold; }

/* ---- REVIEW STUB ---- */
.review-stub {
  min-width: 220px;
  background: #f9f9f9;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 10px;
  font-size: 13px;
}
.review-stub label {
  display: block;
  font-size: 11px;
  color: #555;
  margin-bottom: 2px;
  margin-top: 8px;
}
.review-stub label:first-child { margin-top: 0; }
.review-stub select, .review-stub textarea {
  width: 100%;
  font-size: 12px;
  padding: 3px 5px;
  border: 1px solid #ccc;
  border-radius: 3px;
}
.review-stub textarea {
  height: 60px;
  resize: vertical;
}

.export-btn {
  margin-top: 8px;
  padding: 5px 10px;
  background: #28a745;
  color: #fff;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  width: 100%;
}
.export-btn:hover { background: #218838; }

/* ---- DIFF BOX ---- */
#diffBox {
  margin: 0 12px 8px;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 12px;
  border: 2px solid #ccc;
  background: #fafafa;
}
#diffBox.red-border { border-color: #dc3545; background: #fff5f5; }
#diffBox.orange-border { border-color: #fd7e14; background: #fff8f0; }
#diffBox.gray-border { border-color: #adb5bd; background: #fafafa; }

/* ---- PANELS ---- */
#panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 0 12px 12px;
}

.panel-wrap {
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 4px;
  overflow: hidden;
}

.panel-title {
  background: #e9ecef;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: bold;
  border-bottom: 1px solid #ccc;
}

.panel-content {
  padding: 10px;
  overflow-y: auto;
  max-height: 55vh;
}

.panel-content pre {
  font-family: 'Courier New', 'Consolas', monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.5;
}

.div-header {

  padding: 1px 3px;
  border-radius: 2px;
  font-weight: bold;
}
.div-header.raw-only { background: #fff3cd; }
.div-header.canon-only { background: #cce5ff; }
.div-header.shared { background: #d4edda; }

.empty-panel {
  color: #999;
  font-style: italic;
  padding: 20px;
  text-align: center;
}

/* ---- LEGEND ---- */
.legend {
  margin: 4px 12px 8px;
  font-size: 11px;
  color: #555;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.legend-swatch {
  display: inline-block;
  width: 14px;
  height: 14px;
  border-radius: 2px;
  border: 1px solid #bbb;
}

.stub-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.stub-row label { min-width: 110px; font-size: 12px; color: #555; font-weight: 600; }
.stub-row select, .stub-row input { font-size: 12px; }
.suggestion { font-size: 11px; color: #888; font-style: italic; }
</style>

ote": "minor: 1 duplicate place(s) in \"Intermediate Freestyle\"", "primary_review_reason": "known_issue", "review_focus_rank": 8, "groups": ["known_issue"], "count_mismatch_flag": "", "suggested_pattern_family": "PARTIAL_SOURCE"}, {"event_id": "1058877971", "year": 2003, "event_name": "\"Kick Til You're Sick\" Fall Freestyle Fest", "start_date": "2003-10-17", "end_date": "2003-10-18", "city": "Newtown", "region": "Pennsylvania", "country": "United States", "location_raw": "Newtown, Pennsylvania, United States", "host_club": "Philly Footworks", "review_heat_score": 4, "review_heat_label": "MEDIUM", "diff_summary": "known issue", "known_issue_flag": 1, "known_issue_type": "minor", "override_flag": 0, "recently_modified_flag": 0, "reviewer_flag": 0, "division_count_raw": 3, "division_count_canonical": 3, "placement_count_raw": 12, "placement_count_canonical": 12, "raw_source_level": "MIRROR_HTML", "raw_source_path": "/home/james/projects/FOOTBAG_DATA/mirror/www.footbag.org/events/show/1058877971/index.html", "mirror_source_status": "mirror_html", "mirror_results_found": "YES", "cleaned_mirror_text": "-----------------UPDATE!!!-------------------\nA Few announcements:\nThe GOOD NEWS    -We have secured the venue and gained use of on of the large\ngyms with rubber floor for excellent traction when shredding.  We have this\nfor both days\n-Another good piece of news, I have eliminated any fees for\nCompetition Entry.  If you have some skills, now it costs nothing extra to\ngive it a try.\n-More good news, the shirts that can be purchased at the\nevent have been drastically reduced in price from around ten dollars per\nshirt to just Six Dollars ($6.00 per shirt).  They are really cool and a\ngreat shirt to wear for kicking or going out in.  This is cost for me, so the\nprice is as low as possible.\nThe Bad News:\nThe Price for admission has just been raised by our Venue, the NAC, to $15.00\nper person per day.  This is a great Venue with a large area for lots of\nshredding, over 11 (Eleven) Hours Worth of Shredding all told, water\nfountains that are easily accessible, and other accomidations within close\nproximity to the Gymnasium including restrooms and Vending machines and a\nsnack bar.  The music will be great, we have pros and legends alike comming,\nand it should make for a kick ass weekend.\n_______________________________________________________\nI need anyone who plans on attending\nto email me soon and let me know, even if you're not sure if you can\nmake it. If you plan on staying in the hotel and want it for the special\nprice, you need to call and get a room a month before October 17th, call by\nthe 15th\nof September to be safe.\nThere won't be preregistration.  When you get to the NAC, our venue,\nyou will pay $15.00; just tell them you are there for \"Footbag\".\nI need anyone that wants a shirt to email me with their name and shirt\nsize.  These will be the only people gauranteed to get a shirt.  Everyone\nelse may get a shirt who wants one, but I can't proise I'll have you're size,\nIm getting a few more larges, it seems to be the most common size.\nPlease email me ASAP if you plan on getting a shirt.\n______________________________________________________\n*I'm trying to make this as cheap as possible.  OK, keep reading.\n-   This event will take place from 6:00pm-11:00 pm friday night,\nand there will be more of the same the next morning on Saturday, from\n10:00am-4:00pm.\n-   Prizes For Competitions:\nOPEN LEVEL:  Due to recent changes, there will be no cash prizes, simply\nprops from all and bragging rights.\nNOVICE & INTERMEDIATE.  We'll have some product prizes for the first\nand second places in each of these categories.\n-   We will be filming a lot of the Jam and the competitions, and we hope to\nmake a video edited by myself and some friends to either sell to those\nwho attend, maybe make this a prize as well, and to put some of the event\non www.philly-footworks.com\n-   As far as entry fees for competi rienne Dukes\n  4. Aaron Hunsburger", "diff_notes": "Counts match (div=12, placements=47)", "known_issue_note": "", "primary_review_reason": "override_used", "review_focus_rank": 8, "groups": ["override_used"], "count_mismatch_flag": "", "suggested_pattern_family": "OVERRIDE_OK"}, {"event_id": "1149881200", "year": 2006, "event_name": "Funtastik Summer Classic Tournament and Festival", "start_date": "2006-09-02", "end_date": "2006-09-04", "city": "Harrisburg", "region": "Pennsylvania", "country": "USA", "location_raw": "Harrisburg, Pennsylvania, USA", "host_club": "", "review_heat_score": 4, "review_heat_label": "MEDIUM", "diff_summary": "override used", "known_issue_flag": 0, "known_issue_type": "", "override_flag": 1, "recently_modified_flag": 0, "reviewer_flag": 0, "division_count_raw": 11, "division_count_canonical": 11, "placement_count_raw": 40, "placement_count_canonical": 39, "raw_source_level": "MIRROR_HTML", "raw_source_path": "/home/james/projects/FOOTBAG_DATA/mirror/www.footbag.org/events/show/1149881200/index.html", "mirror_source_status": "mirror_html", "mirror_results_found": "YES", "cleaned_mirror_text": "Cheers to all the competitiors who came to play net on Saturday in the rain.\nBy noon some heavy shredding was taking place under the pavillion.  Later,\neveryone headed to the new host Holiday Inn Hotel.  Hot tubing, shredding and\nfun was had by all. By Sunday, the rain was gone and the competition continued\nalong the river on Front St.  We had great visability on the grass areas\nacross the street that the recreation department alotted us. The skills\ncontests had a record number of competitors and proved to be of\ngreatentertainment.  The final conclusion is that no one is practicing their\ngolf shots!!!  Sunday night we honored the new 2006 Hall of Fame inductees\nRandy Nelson, Ian Kobiyachi and Scott Davidson.  At the host Holiday Inn\nResort, Master of Ceremonies, Peter Irish, along with 7 other Hall of Famers\nhonored and presented Scott with his Hall of Fame shirt and mug. Afterwards,\nthere was circle kicking with glow in the dark footbags called Nightbalz.  The\nshredders commanded their room and the celebration continued until the wee\nhours of the morning.  Monday was a super day with great net games, modest\nservice poaching and a fight to the finish skills contests (yes...physical\ncontact, devious blocks, etc.) that resulted in one World Record Time.\nFreestyle was highlighted with a dropless and one drop routines.  A final\nfarewell performance by Tuan Vu and Ben Kellman's rendition of Ted Fritsch's\nlong standing freestyle routine gave the crowd a great show.\nThere was $1800 in cash prizes and plenty of merchandise prizes awarded.  We\nhad over 40 people at the brewery for get together after the tournament.  And\nthe 21st Funtastik Summer Classic went down into the history books as a huge\nsuccess.  Will there be a 22nd?  You bet ya!!\n2006 FUNTASTIK\nSUMMER CLASSIC RESULTS\nSEPTEMBER 2, 3 & 4\nCash prize- $1800\nPlus merchandise\nPRO SINGLE NET\n1. Emmanuel Bouchard $275\n2  JF Lemieux  $125\n3. Phillip Lessard  $50\n4. Gilles Demers $25\nPRO DOUBLES NET\n1. E Bouchard/JF Lemieux $300\n2. E Wulff/J Leyes $100\n3   F. Peltier /P.Lessard $50\nPRO FREESTYLE- SINGLE\n1. David Clavens  $275  dropless\n2. Scott Bevier\t   $125  1 drop\n3.Scott Davidson\n$50\n4.Tuan Vu  $25\n5.Greg Nelson\nprize\nPRO GOLF\n1.  Jamie Lepley-      prize\n2. Jeremy Walters-     prize\n3. Dan Greer-\t       prize\nIRON MAN- Eric Wulff           $100\nFREESTYLE SHRED- David Clavens $100\nSERVICE POACHING-Jamie Lepley  $100\nSUPERMAN- Tuan Vu              $100\n1:33 New World Record\nSINGLES NET- INTERMEDIATE\n1. Dan Greer\n2. Ted Fritsch\n3. Chris Cleaver\n4.  Jack Lentz\nDOUBLES NET- INTERMEDIATE\n1.\tC. Cleaver/J. Walters\n2.\tM. Daniels/E. Daniesl\n3.\tJ. Lentz/D. Greer\n4.\tT. Fritsch/J. Penny\nSINGLES NET- NOVICE\n1. Chris Balch\n2. David\nBeyers\n3. Cody Carr\nDOUBLES NET- NOVICE\nNo entries\nGOLF -AMATEUR\n1. Jim Wentz\n2. Cory Carr\nFREESTYLE-AMATEUR\n1.\tChris Balch\n2.\tDavid Beyers\n3.\tCory Carr\nFREESTYLE ? NOVICE\n1.  Adrienne Dukes\n2. David Beyers\n3. Dan Johnson\nMASTER?S SINGLES NET\n1. Vince Bradley\n2. Joe Solonoski\n3.Jack Lentz\n4.Mark Daniels\n5. Ted Fritsch\n6. PJ Daigle\nCheck out this link for another review of the tournament on\nhttp://chaosfootbag.com/index.php\nA spectator, Alan, took some photos and sent the link to his site.  Check them\nout.   http://www.flickr.com/photos/nicestalan/", "raw_html_snippet": "<pre class=\"eventsPre\">\nCheers to all the competitiors who came to play net on Saturday in the rain.  \nBy noon some heavy shredding was taking place under the pavillion.  Later, \neveryone headed to the new host Holiday Inn Hotel.  Hot tubing, shredding and \nfun was had by all. By Sunday, the rain was gone and the competition continued \nalong the river on Front St.  We had great visability on the grass areas \nacross the street that the recreation department alotted us. The skills \ncontests had a record number of competitors and proved to be of \ngreatentertainment.  The final conclusion is that no one is practicing their \ngolf shots!!!  Sunday night we honored the new 2006 Hall of Fame inductees \nRandy Nelson, Ian Kobiyachi and Scott Davidson.  At the host Holiday Inn \nResort, Master of Ceremonies, Peter Irish, along with 7 other Hall of Famers \nhonored and presented Scott with his Hall of Fame shirt and mug. Afterwards, \nthere was circle kicking with glow in the dark footbags called Nightbalz.  The \nshredders commanded their room and the celebration continued until the wee \nhours of the morning.  Monday was a super day with great net games, modest \nservice poaching and a fight to the finish skills contests (yes...physical \ncontact, devious blocks, etc.) that resulted in one World Record Time.  \nFreestyle was highlighted with a dropless and one drop routines.  A final \nfarewell performance by Tuan Vu and Ben Kellman's renditio alz.  The\nshredders commanded their room and the celebration continued until the wee\nhours of the morning.  Monday was a super day with great net games, modest\nservice poaching and a fight to the finish skills contests (yes...physical\ncontact, devious blocks, etc.) that resulted in one World Record Time.\nFreestyle was highlighted with a dropless and one drop routines.  A final\nfarewell performance by Tuan Vu and Ben Kellman's rendition of Ted Fritsch's\nlong standing freestyle routine gave the crowd a great show.\nThere was $1800 in cash prizes and plenty of merchandise prizes awarded.  We\nhad over 40 people at the brewery for get together after the tournament.  And\nthe 21st Funtastik Summer Classic went down into the history books as a huge\nsuccess.  Will there be a 22nd?  You bet ya!!\n2006 FUNTASTIK\nSUMMER CLASSIC RESULTS\nSEPTEMBER 2, 3 &amp; 4\nCash prize- $1800\nPlus merchandise\n<span class=\"div-header shared\">PRO SINGLE NET</span>\n1. Emmanuel Bouchard $275\n2  JF Lemieux  $125\n3. Phillip Lessard  $50\n4. Gilles Demers $25\n<span class=\"div-header shared\">PRO DOUBLES NET</span>\n1. E Bouchard/JF Lemieux $300\n2. E Wulff/J Leyes $100\n3   F. Peltier /P.Lessard $50\n<span class=\"div-header shared\">PRO FREESTYLE- SINGLE</span>\n1. David Clavens  $275  dropless\n2. Scott Bevier\t   $125  1 drop\n3.Scott Davidson\n$50\n4.Tuan Vu  $25\n5.Greg Nelson\nprize\n<span class=\"div-header shared\">PRO GOLF</span>\n1.  Jamie Lepley-      prize\n2. Jeremy Walters-     prize\n3. Dan Greer-\t       prize\nIRON MAN- Eric Wulff           $100\n<span class=\"div-header raw-only\">FREESTYLE SHRED- David Clavens $100</span>\nSERVICE POACHING-Jamie Lepley  $100\nSUPERMAN- Tuan Vu              $100\n1:33 New World Record\n<span class=\"div-header shared\">SINGLES NET- INTERMEDIATE</span>\n1. Dan Greer\n2. Ted Fritsch\n3. Chris Cleaver\n4.  Jack Lentz\n<span class=\"div-header shared\">DOUBLES NET- INTERMEDIATE</span>\n1.\tC. Cleaver/J. Walters\n2.\tM. Daniels/E. Da erfly>DLO)\nOpen Big3:\nJust don't ask\nIntermediate Shred30:\n1st: Danny Iachini\n2nd: Danny Greer\n3rd: Nick Miller\nOpen Shred30:\n1st: Brad Nelson\n2nd: Caleb Abraham\n3rd: Josh Benham\nThe competition was only one round, unlike we originally planned.  We had some\ntrouble with a time spot on the main stage Sunday but everyone was having way\ntoo much fun shredding on the street to care.  Brad Nelson was going NUTS!\nTrying big tricks and huge combos.  I'm not sure if he hit it but he was\ndefinitely close to Gauntlet.  Jake Milofsky was staying strong with his super\nsmooth style all day.  The Erie crew came out for some kicks and even hiked\nalong side Bill Hamilton a good 6 blocks from the tournament site just to play\nsome net.  Props to Danny Greer from that crew for improving so much.  Big ups\nto the Philly crew for coming all three days, you guys are the best.  Josh\nBenham is hitting both side blurs like it's his job these days, look out.  And\nJohn Mahood made me laugh all weekend.  Everyone missed out on spaghetti dinner\nbecause he ate it all within a blink of an eye.  Cranberry represented with\nDanny Iachini and Matt Park who showed that they have been skooling like crazy\nas well.\nCrowds were huge, and they didn't faulter all day.  The \"ooh\"s and \"Ahh\"s were\nso common they were almost annoying.........naa, no they weren't.  Our show on\nthe main stage brought in the biggest crowd all weekend.  The crowd ran out of\nchairs!\nNone of this could've happened without the help of our sponsers Freedom\nFootbags and World Footbag Association.  And Bob Riefer as always was helpful\nto say the least, though he was missing in action.\nLastly I'd like to thank the booth babes: Sarah Boe, Laura Figley, My Mom, Sara\nOhi, and Mrs. Iachini.  You guys helped out the most and I am grateful.  Thanks\nto everyone who came and be sure to come back next year.", "raw_html_snippet": "<pre class=\"eventsPre\">\nThe Steel City Open was a huge success.  Lots of fun was had and lots of people \ncame out.  We raised a boat load of cash to donate to the IFPA.  Here are the \nresults from the competition.\n\nIntermediate Big3:\n1st: Danny Iachini (Quantum Legover&gt;Atomic Legover&gt;Legbeater)\n2nd: Danny Greer (Smear&gt;Double Around the World&gt;Butterfly)\n3rd: Nick Miller (Smear&gt;Butterfly&gt;DLO)\n\nOpen Big3:\nJust don't ask\n\nIntermediate Shred30:\n1st: Danny Iachini\n2nd: Danny Greer\n3rd: Nick Miller\n\nOpen Shred30:\n1st: Brad Nelson\n2nd: Caleb Abraham\n3rd: Josh Benham\n\nThe competition was only one round, unlike we originally planned.  We had some \ntrouble with a time spot on the main stage Sunday but everyone was having way \ntoo much fun shredding on the street to care.  Brad Nelson was going NUTS!  \nTrying big tricks and huge combos.  I'm not sure if he hit it but he was \ndefinitely close to Gauntlet.  Jake Milofsky was staying strong with his super \nsmooth style all day.  The Erie crew came out for some kicks and even hiked \nalong side Bill Hamilton a good 6 blocks from the tournament site just to play \nsome net.  Props to Danny Greer from that crew for improving so much.  Big ups \nto the Philly crew for coming all three days, you guys are the best.  Josh \nBenham is hitting both side blurs like it's his job these days, look out.  And \nJohn Mahood made me laugh all weekend.  Everyone missed out on spaghetti dinner \nbecause he ate it all within a blink of an eye.  Cranberry represented with \nDanny Iachini and Matt Park who showed that they have been skooling like crazy \nas well.\n\nCrowds were huge, and they didn't faulter all day.  The \"ooh\"s and \"Ahh\"s were \nso common they were almost annoying.........naa, no they weren't.  Our show on \nthe main stage brought in the biggest crowd all weekend.  The crowd ran out of \nchairs!\n\nNone of this could've happened without the help of our sponsers Freedom \nFootbags and World Footbag Association.  And Bob Riefer as always was helpful \nto say the lea // Review stubs storage
const stubs = {};

let filtered = events.slice();
let currentIdx = 0;
let activeGroup = null;

function getStub(eid) {
  if (!stubs[eid]) {
    stubs[eid] = { status: 'UNREVIEWED', action: 'NONE', note: '' };
  }
  return stubs[eid];
}

function saveStub(eid) {
  const s = document.getElementById('stubStatus');
  const a = document.getElementById('stubAction');
  const n = document.getElementById('stubNote');
  if (s && a && n) {
    if (!stubs[eid]) stubs[eid] = { status: 'UNREVIEWED', action: 'NONE', note: '' };
    stubs[eid].status = s.value;
    stubs[eid].action = a.value;
    stubs[eid].note   = n.value;
  }
  stubs[eid] = stubs[eid] || { status: 'UNREVIEWED', action: 'NONE', note: '' };
  stubs[eid].pattern_family     = document.getElementById('pf-'  + eid)?.value  || '';
  stubs[eid].pattern_confidence = document.getElementById('pc-'  + eid)?.value  || '';
  stubs[eid].promote_to_medium  = document.getElementById('ptm-' + eid)?.value  || 'NO';
  stubs[eid].reusable_rule      = document.getElementById('rr-'  + eid)?.value  || '';
}

function prevEvent() {
  if (filtered.length === 0) return;
  const eid = filtered[currentIdx] && filtered[currentIdx].event_id;
  if (eid) saveStub(eid);
  currentIdx = (currentIdx - 1 + filtered.length) % filtered.length;
  showEvent(currentIdx);
}

function nextEvent() {
  if (filtered.length === 0) return;
  const eid = filtered[currentIdx] && filtered[currentIdx].event_id;
  if (eid) saveStub(eid);
  currentIdx = (currentIdx + 1) % filtered.length;
  showEvent(currentIdx);
}

function jumpTo(val) {
  const idx = parseInt(val);
  if (isNaN(idx)) return;
  const eid = filtered[currentIdx] && filtered[currentIdx].event_id;
  if (eid) saveStub(eid);
  currentIdx = idx;
  showEvent(currentIdx);
}

function filterGroup(btn) {
  const eid = filtered[currentIdx] && filtered[currentIdx].event_id;
  if (eid) saveStub(eid);

  const group = btn.getAttribute('data-group');
  document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('btnAll').classList.add('inactive');

  activeGroup = group;
  filtered = events.filter(e => e.groups.includes(group));
  currentIdx = 0;
  rebuildJump();
  updateCounter();
  if (filtered.length > 0) showEvent(0);
  else clearPanels();
}

function filterAll() {
  const eid = filtered[currentIdx] && filtered[currentIdx].event_id;
  if (eid) saveStub(eid);

  document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btnAll').classList.remove('inactive');
  activeGroup = null;
  filtered = events.slice();
  currentIdx = 0;
  rebuildJump();
  updateCounter();
  if (filtered.length > 0) showEvent(0);
}

function rebuildJump() {
  const sel = document.getElementById('jumpSelect');
  sel.innerHTML = '';
  filtered.forEach((ev, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `[${ev.year || '?'}] ${ev.event_id} â ${ev.event_name.substring(0, 50)}`;
    sel.appendChild(opt);
  });
}

function updateCounter() {
  document.getElementById('navCounter').textContent = `${currentIdx + 1} / ${filtered.length}`;
  document.getElementById('jumpSelect').value = currentIdx;
}

function clearPanels() {
  document.getElementById('eventMeta').innerHTML = '<p style="color:#999">No events in this filter.</p>';
  document.getElementById('reviewStub').innerHTML = '';
  document.getElementById('diffBox').innerHTML = '';
  document.getElementById('rawPanel').innerHTML = '<div class="empty-panel">No events.</div>';
  document.getElementById('canonPanel').innerHTML = '<div class="empty-panel">No events.</div>';
  document.getElementById('navCounter').textContent = '0 / 0';
}

function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function buildMirrorHtml(ev) {
  // Build highlighted HTML from cleaned_mirror_text on the fly
  if (!ev.mirror_html_panel) return '<div class="empty-panel">No mirror content.</div>';
  return '<pre>' + ev.mirror_html_panel + '</pre>';
}

function toggleMirrorView(eventId, mode) {
  const ev = events.find(e => e.event_id === eventId);
  if (!ev) return;
  const panel = document.getElementById('rawPanel');

  if (mode === 'cleaned') {
    panel.innerHTML = buildMirrorHtml(ev);
  } else if (mode === 'raw_html') {
    panel.innerHTML = '<pre style="font-size:11px;white-space:pre-wrap;">' + escHtml(ev.raw_html_snippet) + '</pre>';
  } else if (mode === 'override_file') {
    panel.innerHTML = '<pre style="font-size:11px;white-space:pre-wrap;">' + escHtml(ev.override_file_content) + '</pre>';
  }

  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('toggle-' + mode + '-' + eventId);
  if (activeBtn) activeBtn.classList.add('active');
}

function showEvent(idx) {
  currentIdx = idx;
  updateCounter();

  const ev = filtered[idx];
  if (!ev) { clearPanels(); return; }

  // Header meta
  const divRaw = ev.division_count_raw;
  const divCanon = ev.division_count_canonical;
  const plRaw = ev.placement_count_raw;
  const plCanon = ev.placement_count_canonical;
  const divClass = divRaw !== divCanon ? 'count-mismatch' : 'count-ok';
  const plClass = Math.abs(plRaw - plCanon) > 3 ? 'count-mismatch' : 'count-ok';

  let flags = '';
  if (ev.known_issue_flag) flags += '<span class="badge badge-known_issue">Known Issue</span>';
  if (ev.override_flag) flags += '<span class="badge badge-override_used">Override</span>';
  if (ev.recently_modified_flag) flags += '<span class="badge badge-recently_modified">Recently Modified</span>';
  if (ev.reviewer_flag) flags += '<span class="badge" style="background:#e2d9f3;color:#432874">Reviewer</span>';
  if (ev.count_mismatch_flag === 'YES') flags += '<span class="badge count-mismatch">Count Mismatch</span>';

  const reasonLabel = ev.primary_review_reason.replace(/_/g, ' ');
  const reasonBadge = `<span class="badge badge-${ev.primary_review_reason}">${reasonLabel}</span>`;

  const locParts = [ev.city, ev.region, ev.country].filter(Boolean);
  const loc = locParts.join(', ');
  const dates = ev.start_date !== ev.end_date && ev.end_date
    ? `${ev.start_date} â ${ev.end_date}`
    : ev.start_date;

  // Source badge
  const srcLevel = ev.raw_source_level || 'MISSING';
  const srcBadge = `<span class="source-badge ${srcLevel}">${srcLevel}</span>`;
  const mirrorStatus = ev.mirror_source_status || 'unknown';

  document.getElementById('eventMeta').innerHTML = `
    <h2>[${ev.year || '?'}] ${escHtml(ev.event_name)}</h2>
    <div class="meta-row">
      <strong>ID:</strong> ${ev.event_id}
      &nbsp;|&nbsp; <strong>Heat:</strong> <span class="badge badge-${ev.review_heat_label}">${ev.review_heat_label} (${ev.review_heat_score})</span>
      &nbsp;${reasonBadge}
      ${flags}
    </div>
    <div class="meta-row">
      <strong>Location:</strong> ${escHtml(loc) || 'â'}
      ${ev.host_club ? '&nbsp;|&nbsp; <strong>Club:</strong> ' + escHtml(ev.host_club) : ''}
      &nbsp;|&nbsp; <strong>Dates:</strong> ${escHtml(dates) || 'â'}
    </div>
    <div class="meta-row">
      <strong>Divisions:</strong>
      <span class="${divClass}">raw=${divRaw} / canon=${divCanon}</span>
      &nbsp;&nbsp;
      <strong>Placements:</strong>
      <span class="${plClass}">raw=${plRaw} / canon=${plCanon}</span>
    </div>
    <div class="meta-row"><strong>Diff summary:</strong> ${escHtml(ev.diff_summary)}</div>
    <div class="meta-row">
      <strong>Mirror source:</strong> ${srcBadge}
      <span style="font-size:11px;color:#666;">${mirrorStatus}</span>
      &nbsp;|&nbsp; <strong>Primary review reason:</strong> ${escHtml(ev.primary_review_reason)}
    </div>
    <div class="source-path">${escHtml(ev.raw_source_path)}</div>
  `;

  // Review stub
  const stub = getStub(ev.event_id);
  document.getElementById('reviewStub').innerHTML = `
    <label>Status</label>
    <select id="stubStatus">
      ${['UNREVIEWED','ACCEPT','MINOR_TEXT_FIX','STRUCTURAL_FIX','SOURCE_PARTIAL','DEFER']
        .map(o => `<option${o === stub.status ? ' selected' : ''}>${o}</option>`).join('')}
    </select>
    <label>Action</label>
    <select id="stubAction">
      ${['NONE','PARSER_FIX','PBP_PATCH','RESULTS_FILE_OVERRIDE','IDENTITY_FIX','METADATA_FIX','DOCUMENT_ONLY']
        .map(o => `<option${o === stub.action ? ' selected' : ''}>${o}</option>`).join('')}
    </select>
    <label>Note</label>
    <textarea id="stubNote" placeholder="Review notes...">${escHtml(stub.note)}</textarea>
    <div class="stub-row">
      <label>Pattern Family</label>
      <select id="pf-${ev.event_id}" onchange="saveStub('${ev.event_id}')">
        <option value="">-- select --</option>
        <option value="MERGED_DIVISIONS">MERGED_DIVISIONS</option>
        <option value="PARSER_COLLAPSE">PARSER_COLLAPSE</option>
        <option value="POOL_FINALS">POOL_FINALS</option>
        <option value="CONTEST_FORMAT">CONTEST_FORMAT</option>
        <option value="PARTIAL_SOURCE">PARTIAL_SOURCE</option>
        <option value="TEXT_NOISE">TEXT_NOISE</option>
        <option value="LOCATION_METADATA">LOCATION_METADATA</option>
        <option value="OVERRIDE_OK">OVERRIDE_OK</option>
        <option value="UNKNOWN">UNKNOWN</option>
      </select>
      <span class="suggestion" id="pf-suggest-${ev.event_id}"></span>
    </div>
    <div class="stub-row">
      <label>Confidence</label>
      <select id="pc-${ev.event_id}" onchange="saveStub('${ev.event_id}')">
        <option value="">-- select --</option>
        <option value="HIGH">HIGH</option>
        <option value="MEDIUM">MEDIUM</option>
        <option value="LOW">LOW</option>
      </select>
    </div>
    <div class="stub-row">
      <label>Promote to Medium</label>
      <select id="ptm-${ev.event_id}" onchange="saveStub('${ev.event_id}')">
        <option value="NO">NO</option>
        <option value="YES">YES</option>
      </select>
    </div>
    <div class="stub-row">
      <label>Reusable Rule</label>
      <input type="text" id="rr-${ev.event_id}" placeholder="short plain-English rule..."
             style="width:100%;font-size:12px;" oninput="saveStub('${ev.event_id}')">
    </div>
    <button class="export-btn" onclick="exportStubs()">Export Stubs CSV</button>
  `;

  // Restore saved stub values for new eid-suffixed fields
  const s = getStub(ev.event_id);
  if (s.pattern_family)     document.getElementById('pf-'  + ev.event_id).value = s.pattern_family;
  if (s.pattern_confidence) document.getElementById('pc-'  + ev.event_id).value = s.pattern_confidence;
  if (s.promote_to_medium)  document.getElementById('ptm-' + ev.event_id).value = s.promote_to_medium;
  if (s.reusable_rule)      document.getElementById('rr-'  + ev.event_id).value = s.reusable_rule;

  // Show suggestion next to pattern family
  const suggestEl = document.getElementById('pf-suggest-' + ev.event_id);
  if (suggestEl && ev.suggested_pattern_family) {
    suggestEl.textContent = 'â suggest: ' + ev.suggested_pattern_family;
    suggestEl.style.color = '#888';
    suggestEl.style.fontSize = '11px';
    suggestEl.style.marginLeft = '8px';
  }

  // Diff box
  let diffClass = 'gray-border';
  if (divRaw !== divCanon) diffClass = 'red-border';
  else if (Math.abs(plRaw - plCanon) > 3) diffClass = 'orange-border';
  const diffBox = document.getElementById('diffBox');
  diffBox.className = diffClass;
  diffBox.innerHTML = `<strong>Diff:</strong> ${escHtml(ev.diff_notes)}`;

  // Panel titles
  document.getElementById('rawTitle').textContent = `MIRROR SOURCE â ${plRaw} placements (raw)`;
  document.getElementById('canonTitle').textContent = `CANONICAL (PBP v59) â ${plCanon} placements`;

  // Build toggle bar for LEFT panel
  const hasMirrorHtml = (srcLevel === 'MIRROR_HTML') && ev.raw_html_snippet;
  const hasOverrideFile = ev.override_file_content && ev.override_file_content.length > 0;

  let toggleBar = '<div class="toggle-bar">';
  if (hasMirrorHtml || hasOverrideFile) {
    // Only show toggle buttons if there are alternatives
    toggleBar += `<button class="toggle-btn active" id="toggle-cleaned-${ev.event_id}" onclick="toggleMirrorView('${ev.event_id}', 'cleaned')">VIEW CLEANED</button>`;
    if (hasMirrorHtml) {
      toggleBar += `<button class="toggle-btn" id="toggle-raw_html-${ev.event_id}" onclick="toggleMirrorView('${ev.event_id}', 'raw_html')">VIEW RAW HTML</button>`;
    }
    if (hasOverrideFile) {
      toggleBar += `<button class="toggle-btn" id="toggle-override_file-${ev.event_id}" onclick="toggleMirrorView('${ev.event_id}', 'override_file')">VIEW OVERRIDE FILE</button>`;
    }
  }
  toggleBar += '</div>';

  const rawPanel = document.getElementById('rawPanel');
  const canonPanel = document.getElementById('canonPanel');

  if (ev.mirror_html_panel && ev.mirror_html_panel.trim()) {
    rawPanel.innerHTML = toggleBar + '<pre>' + ev.mirror_html_panel + '</pre>';
  } else if (ev.cleaned_mirror_text && ev.cleaned_mirror_text.trim()) {
    rawPanel.innerHTML = toggleBar + '<pre>' + escHtml(ev.cleaned_mirror_text) + '</pre>';
  } else {
    rawPanel.innerHTML = '<div class="empty-panel">No mirror content available.</div>';
  }

  if (ev.canonical_html && ev.canonical_html.trim()) {
    canonPanel.innerHTML = `<pre>${ev.canonical_html}</pre>`;
  } else {
    canonPanel.innerHTML = '<div class="empty-panel">No canonical placements available.</div>';
  }
}

function exportStubs() {
  const ev = filtered[currentIdx];
  if (ev) saveStub(ev.event_id);

  const rows = [['event_id','year','event_name','review_status','action_needed','review_note','primary_review_reason','mirror_source_status','pattern_family','pattern_confidence','promote_fix_to_medium','review_reusable_rule']];
  events.forEach(e => {
    const s = getStub(e.event_id);
    const pf  = (s.pattern_family     || '').replace(/"/g,'""');
    const pc  = (s.pattern_confidence || '').replace(/"/g,'""');
    const ptm = (s.promote_to_medium  || 'NO').replace(/"/g,'""');
    const rr  = (s.reusable_rule      || '').replace(/"/g,'""');
    rows.push([e.event_id, e.year, e.event_name, s.status, s.action, s.note, e.primary_review_reason, e.mirror_source_status, pf, pc, ptm, rr]);
  });

  const csv = rows.map(r => r.map(v => `"${String(v || '').replace(/"/g, '""')}"` ).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'event_review_stubs.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// Init
rebuildJump();
updateCounter();
if (filtered.length > 0) showEvent(0);
</script>
</body>
</html>
